<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Among Us — Log Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030608;
            --surface: #07101a;
            --surface2: #0b1620;
            --border: #152030;
            --border-hi: #2a5080;
            --accent: #00c8ff;
            --danger: #ff2848;
            --safe: #00e676;
            --warn: #ffaa00;
            --purple: #b44bff;
            --t1: #e2eeff;
            --t2: #8aaccc;
            --t3: #3d6080;
            --t4: #1e3350;
            --glow-a: 0 0 24px rgba(0,200,255,.35);
            --glow-d: 0 0 24px rgba(255,40,72,.35);
        }
        [data-theme="light"] {
            --bg: #edf1f7;
            --surface: #ffffff;
            --surface2: #f4f7fc;
            --border: #ccd6ec;
            --border-hi: #5a80c0;
            --accent: #0070b8;
            --danger: #cc0030;
            --safe: #007c40;
            --warn: #a06000;
            --purple: #7022cc;
            --t1: #0a1828;
            --t2: #2a4060;
            --t3: #5a7090;
            --t4: #9ab0c8;
            --glow-a: 0 0 20px rgba(0,112,184,.18);
            --glow-d: 0 0 20px rgba(204,0,48,.18);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { height: 100%; }
        body {
            background: var(--bg);
            color: var(--t2);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            transition: background .3s, color .3s;
        }
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: radial-gradient(circle, rgba(0,200,255,.04) 1px, transparent 1px);
            background-size: 28px 28px;
        }
        [data-theme="light"] .bg-grid {
            background-image: radial-gradient(circle, rgba(0,112,184,.04) 1px, transparent 1px);
        }
        .bg-glow {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                    radial-gradient(ellipse 60% 50% at 10% 5%, rgba(0,100,200,.1) 0%, transparent 65%),
                    radial-gradient(ellipse 50% 45% at 88% 88%, rgba(180,75,255,.07) 0%, transparent 60%);
        }
        [data-theme="light"] .bg-glow {
            background: radial-gradient(ellipse 60% 50% at 10% 5%, rgba(0,80,180,.04) 0%, transparent 65%);
        }
        .theme-toggle {
            position: fixed; top: 1.2rem; right: 1.2rem; z-index: 100;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--t3);
            border-radius: 4px;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1rem;
            transition: all .15s;
        }
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
        .wrap {
            position: relative; z-index: 1;
            width: min(500px, calc(100vw - 2rem));
            padding: 2rem 0;
            animation: fadein .45s ease both;
        }
        @keyframes fadein { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
        .logo-area { text-align: center; margin-bottom: 2.5rem; }
        .logo-rings {
            position: relative; width: 56px; height: 56px; margin: 0 auto 1.2rem;
        }
        .logo-rings div {
            position: absolute; inset: 0; border-radius: 50%;
            border: 2px solid transparent;
            animation: spin 2s linear infinite;
        }
        .logo-rings div:nth-child(1) { border-top-color: var(--accent); }
        .logo-rings div:nth-child(2) { border-right-color: var(--danger); animation-duration: 2.6s; animation-direction: reverse; inset: 5px; }
        .logo-rings div:nth-child(3) { border-bottom-color: var(--purple); animation-duration: 3.4s; inset: 10px; }
        .logo-rings .center-dot {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; animation: none; border: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .logo-eyebrow {
            font-size: .52rem; letter-spacing: .5em; color: var(--accent);
            opacity: .7; margin-bottom: .35rem; text-transform: uppercase;
        }
        .logo-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 700;
            letter-spacing: .2em;
            color: var(--t1);
            line-height: 1;
        }
        .logo-sub {
            font-size: .6rem;
            letter-spacing: .3em;
            color: var(--t3);
            margin-top: .55rem;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 24px 70px rgba(0,0,0,.5);
            position: relative;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: .35;
        }
        [data-theme="light"] .card { box-shadow: 0 8px 40px rgba(0,0,0,.1); }
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            flex: 1; padding: .85rem 1rem;
            font-size: .65rem; letter-spacing: .12em;
            color: var(--t3);
            background: transparent; border: none;
            cursor: pointer; text-align: center;
            text-transform: uppercase;
            transition: all .15s;
            position: relative; font-family: 'JetBrains Mono', monospace;
        }
        .tab.active { color: var(--t1); }
        .tab.active::after {
            content: '';
            position: absolute; bottom: -1px; left: 15%; right: 15%; height: 2px;
            background: var(--accent);
            border-radius: 1px;
        }
        .tab-panel { display: none; padding: 1.6rem; }
        .tab-panel.active { display: block; }
        .drop-zone {
            border: 1px dashed var(--border-hi);
            border-radius: 8px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--accent);
            box-shadow: var(--glow-a);
            background: rgba(0,200,255,.025);
        }
        .drop-icon { font-size: 2rem; margin-bottom: .65rem; display: block; }
        .drop-title {
            font-size: .82rem; letter-spacing: .1em;
            color: var(--accent); margin-bottom: .3rem;
        }
        .drop-sub {
            font-size: .64rem; color: var(--t3);
        }
        #file-input { display: none; }
        .input-group { margin-bottom: 1rem; }
        .input-label {
            font-size: .62rem; letter-spacing: .12em;
            color: var(--t2); margin-bottom: .5rem;
            display: block; text-transform: uppercase;
        }
        .text-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: .7rem .9rem;
            color: var(--t1);
            font-family: 'JetBrains Mono', monospace;
            font-size: .82rem;
            outline: none;
            transition: all .15s; letter-spacing: .05em;
        }
        .text-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,200,255,.1); }
        .text-input::placeholder { color: var(--t4); }
        .btn-primary {
            width: 100%;
            background: rgba(0,200,255,.08);
            border: 1px solid rgba(0,200,255,.35);
            color: var(--accent);
            border-radius: 6px;
            padding: .75rem 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: .72rem; letter-spacing: .1em;
            cursor: pointer; text-transform: uppercase;
            transition: all .15s;
        }
        .btn-primary:hover {
            background: rgba(0,200,255,.14);
            box-shadow: var(--glow-a);
        }
        .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
        .error-msg {
            display: none;
            background: rgba(255,40,72,.08);
            border: 1px solid rgba(255,40,72,.3);
            border-radius: 6px;
            padding: .65rem .9rem;
            font-size: .68rem; color: var(--danger);
            margin-top: .7rem;
        }
        .loading-indicator {
            display: none;
            text-align: center; padding: .7rem;
            font-size: .68rem; color: var(--t3);
            letter-spacing: .1em;
            animation: blink 1.4s ease infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
        .footer-note {
            text-align: center; margin-top: 1.4rem;
            font-size: .58rem; letter-spacing: .1em; color: var(--t4);
        }
        .feature-row {
            display: flex; gap: .5rem; margin-bottom: .9rem;
            flex-wrap: wrap;
        }
        .feature-chip {
            font-size: .56rem; letter-spacing: .06em; color: var(--t3);
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 3px; padding: 3px 8px;
        }
    </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<button class="theme-toggle" id="theme-btn" title="Change theme">◑</button>

<div class="wrap">
    <div class="logo-area">
        <div class="logo-rings">
            <div></div><div></div><div></div>
            <div class="center-dot">🚀</div>
        </div>
        <div class="logo-eyebrow">Forensic Analysis System</div>
        <div class="logo-title">Among Us</div>
        <div class="logo-sub">// ACTION LOG VIEWER //</div>
    </div>

    <div class="card">
        <div class="tabs">
            <button class="tab active" data-tab="file">↓ Log Drop</button>
            <button class="tab" data-tab="code">⌨ Code / URL</button>
        </div>

        <div class="tab-panel active" id="panel-file">
            <div class="feature-row">
                <span class="feature-chip">📦 All packages</span>
                <span class="feature-chip">🤖 Bot detection</span>
                <span class="feature-chip">🔍 Regex search</span>
                <span class="feature-chip">⚔ Kill-Board</span>
                <span class="feature-chip">🎭 Special abilities</span>
            </div>
            <div class="drop-zone" id="drop-zone">
                <span class="drop-icon">📡</span>
                <div class="drop-title">Drop JSON-Log</div>
                <div class="drop-sub">Drag &amp; Drop · or click to select</div>
                <input type="file" id="file-input" accept=".json">
            </div>
        </div>

        <div class="tab-panel" id="panel-code">
            <div class="input-group">
                <label class="input-label" for="code-input">Log-Code or URL</label>
                <input
                        class="text-input" id="code-input" type="text"
                        placeholder="z.B. abcd1234 or https://…/log/abcd1234"
                        autocomplete="off" spellcheck="false"
                >
            </div>
            <button class="btn-primary" id="open-btn">Open log →</button>
            <div class="error-msg" id="error-msg"></div>
            <div class="loading-indicator" id="loading-ind">Connecting…</div>
        </div>
    </div>

    <div class="footer-note">Data processed locally · No upload · Open Source</div>
</div>

<script>
    const themeBtn = document.getElementById('theme-btn');
    const saved = localStorage.getItem('au-theme') || 'dark';
    if (saved === 'light') { document.documentElement.setAttribute('data-theme','light'); themeBtn.textContent = '○'; }

    themeBtn.addEventListener('click', () => {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
        themeBtn.textContent = isLight ? '◑' : '○';
        localStorage.setItem('au-theme', isLight ? 'dark' : 'light');
    });

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
        });
    });

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault(); dropZone.classList.remove('drag-over');
        const f = e.dataTransfer.files[0];
        if (f) handleFile(f);
    });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

    function handleFile(f) {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const data = JSON.parse(e.target.result);
                sessionStorage.setItem('au-log-local', JSON.stringify(data));
                window.location.href = '/log/local';
            } catch(err) { alert('Invalid JSON file: ' + err.message); }
        };
        reader.readAsText(f);
    }

    const openBtn = document.getElementById('open-btn');
    const codeInput = document.getElementById('code-input');
    const errorMsg = document.getElementById('error-msg');
    const loadingInd = document.getElementById('loading-ind');

    openBtn.addEventListener('click', handleCodeOpen);
    codeInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleCodeOpen(); });

    function extractCode(raw) {
        raw = raw.trim();
        try {
            const url = new URL(raw);
            const m = url.pathname.match(/\/log\/([^\/]+)/);
            if (m) return m[1];
        } catch {}
        return raw.replace(/[^a-zA-Z0-9_-]/g,'');
    }

    function handleCodeOpen() {
        const raw = codeInput.value.trim();
        if (!raw) return;
        const code = extractCode(raw);
        if (!code) { showError('Invalid code or URL.'); return; }
        window.location.href = '/log/' + encodeURIComponent(code);
    }

    function showError(msg) {
        errorMsg.textContent = msg; errorMsg.style.display = 'block';
        setTimeout(() => errorMsg.style.display = 'none', 4000);
    }
</script>
</body>
</html>
